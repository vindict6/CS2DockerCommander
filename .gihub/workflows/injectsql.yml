name: Inject SQL Backup to Volume Root

on:
  workflow_dispatch:

jobs:
  inject_backup:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load Deployment Settings
        id: load_settings
        run: |
          SETTINGS_FILE="${{ github.workspace }}/deployment_settings.json"
          
          if [ -f "$SETTINGS_FILE" ]; then
            DOCKER_VOLUME_NAME=$(jq -r '.DOCKER_VOLUME_NAME // "cs2-data"' "$SETTINGS_FILE")
            echo "DOCKER_VOLUME_NAME=$DOCKER_VOLUME_NAME" >> $GITHUB_ENV
            echo "Loaded Volume: $DOCKER_VOLUME_NAME"
          else
            echo "::error::deployment_settings.json not found in root!"
            exit 1
          fi

      - name: Copy SQL file into Volume Root
        run: |
          echo "Copying backup to the root of Docker volume: ${{ env.DOCKER_VOLUME_NAME }}..."
          
          # Use a temporary container to copy the file directly into the persistent volume
          docker run --rm \
            -v ${{ env.DOCKER_VOLUME_NAME }}:/CS2 \
            -v ${{ github.workspace }}/databases:/backup:ro \
            alpine cp /backup/cs2_admin_backup.sql /CS2/.cs2_admin_backup.sql
          
          echo "File successfully injected into volume."

      - name: Verify file in volume
        run: |
          echo "Verifying file placement in volume root..."
          
          docker run --rm \
            -v ${{ env.DOCKER_VOLUME_NAME }}:/CS2:ro \
            alpine ls -lh /CS2/.cs2_admin_backup.sql
