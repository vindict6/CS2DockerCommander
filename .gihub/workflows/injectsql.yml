name: Inject SQL Backup to Container Root

on:
  workflow_dispatch:

jobs:
  inject_backup:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load Deployment Settings
        id: load_settings
        run: |
          SETTINGS_FILE="${{ github.workspace }}/deployment_settings.json"
          
          if [ -f "$SETTINGS_FILE" ]; then
            # Extract the CONTAINER_NAME using jq
            CONTAINER=$(jq -r '.CONTAINER_NAME' "$SETTINGS_FILE")
            echo "CONTAINER_NAME=$CONTAINER" >> $GITHUB_ENV
            echo "Loaded Container: $CONTAINER"
          else
            echo "::error::deployment_settings.json not found in root!"
            exit 1
          fi

      - name: Copy SQL file into Container Root
        run: |
          echo "Copying backup to the root (/) of running container: ${{ env.CONTAINER_NAME }}..."
          
          # docker cp copies the file directly into the running container's filesystem
          docker cp ${{ github.workspace }}/databases/cs2_admin_backup.sql ${{ env.CONTAINER_NAME }}:/cs2_admin_backup.sql
          
          echo "File successfully injected."

      - name: Verify file in container
        run: |
          echo "Verifying file placement in container root..."
          
          # Exec into the container to verify it is at /
          docker exec ${{ env.CONTAINER_NAME }} ls -lh /cs2_admin_backup.sql
